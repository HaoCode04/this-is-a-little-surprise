<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>猜猜看</title>
    <style>
        :root { --ios-blue: #007AFF; }
        body { margin: 0; background: #F2F2F7; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .card { width: 85%; max-width: 320px; animation: fadeIn 0.5s ease; }
        .emoji { font-size: 60px; margin-bottom: 20px; display: block; }
        h2 { font-size: 20px; color: #1C1C1E; margin-bottom: 15px; font-weight: 600; }
        p { font-size: 16px; color: #3A3A3C; margin-bottom: 50px; line-height: 1.5; }
        .ios-btn { 
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 50px; background: var(--ios-blue); 
            border-radius: 14px; color: white; font-size: 17px; font-weight: 600; 
            text-decoration: none; box-shadow: 0 4px 15px rgba(0,122,255,0.2);
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div class="card">
        <span class="emoji"></span>
        <h2>今天是什么日子呢？</h2>
        <p>好难猜呀...<br>感觉空气里都带点甜味了呢</p>
        <a href="birthday.html" class="ios-btn">去揭晓答案</a>
    </div>
</body>
</html>
