<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Welcome</title>
    <style>
        :root { --ios-blue: #007AFF; --bg: #F2F2F7; }
        
        /* 核心修改：确保 body 占据全屏并居中所有内容 */
        body { 
            margin: 0; 
            padding: 0;
            background: var(--bg); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif; 
            display: flex; 
            flex-direction: column; /* 纵向排列 */
            align-items: center;    /* 水平居中 */
            justify-content: center;/* 垂直居中 */
            height: 100vh;          /* 占据视口 100% 高度 */
            width: 100vw;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .container { 
            text-align: center; 
            padding: 20px; 
            animation: fadeIn 0.8s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center; /* 确保容器内子元素也水平居中 */
        }

        h1 { font-size: 24px; font-weight: 600; color: #1C1C1E; margin-bottom: 12px; }
        p { font-size: 15px; color: #8E8E93; margin-bottom: 40px; }

        .ios-btn { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            width: 260px; /* 稍微调窄一点，更有 iOS 按钮的精致感 */
            height: 52px; 
            background: var(--ios-blue); 
            border-radius: 14px; 
            color: white; 
            font-size: 17px; 
            font-weight: 600; 
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,122,255,0.25);
            transition: all 0.2s;
        }

        /* 点击反馈效果 */
        .ios-btn:active { 
            transform: scale(0.96); 
            opacity: 0.9; 
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>亲爱的朋友，欢迎来到本网站！</h1>
        <p>请点击继续按钮进入下一页</p>
        
        <a href="verify.html" class="ios-btn">继续</a>
    </div>

</body>
</html>
